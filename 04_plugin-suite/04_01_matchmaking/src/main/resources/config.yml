# Matchmaking 插件配置

# 隊列配置
queue:
  default_ttl: 300  # 5 分鐘
  max_size: 100

# 後端配置
backend:
  strategy: "least_players"  # least_players, round_robin, random
  health_check_interval: 30

# GUI 配置
gui:
  title: "§6=== 配對界面 ==="
  refresh_interval: 5

# 配對配置
matchmaking:
  cooldown: 5  # 秒
  max_matches: 8
