database:
  host: "localhost"
  port: 3306
  database: "partygame"
  username: "root"
  password: "password"
  pool:
    maximumPoolSize: 10
    minimumIdle: 2
    connectionTimeout: 30000

redis:
  host: "localhost"
  port: 6379
  password: ""
  database: 0
  channel: "partygame:matchmaking"
  pool:
    maxTotal: 20
    maxIdle: 10
    minIdle: 5

backend:
  selection_strategy: "least_players"
  health_check_interval: 30

gui:
  theme: "dark"
  refresh_interval: 10

match:
  queue_ttl: 300
  max_players_match: 8
  cooldown: 5
  default_wait_estimate: 60
