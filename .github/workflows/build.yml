name: Build PurWM

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-plugins:
    name: Build Plugins ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: common-lib
            path: 04_plugin-suite/04_04_common-lib
          - name: matchmaking
            path: 04_plugin-suite/04_01_matchmaking
          - name: friend
            path: 04_plugin-suite/04_03_friend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Gradle Wrapper Validate
        uses: gradle/actions/wrapper-validation@v3

      - name: Build ${{ matrix.name }}
        run: ./gradlew :${{ matrix.path }}:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-jar
          path: ${{ matrix.path }}/build/libs/*.jar
          retention-days: 7

  build-framework:
    name: Build Framework
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: purpur-swm
            path: 01_purpur-swm-framework
          - name: partygame-swm
            path: 02_purpur-swm-partygame
          - name: world-converter
            path: 03_world-converter
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Gradle Wrapper Validate
        uses: gradle/actions/wrapper-validation@v3

      - name: Build ${{ matrix.name }}
        run: ./gradlew :${{ matrix.path }}:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-jar
          path: ${{ matrix.path }}/build/libs/*.jar
          retention-days: 7
