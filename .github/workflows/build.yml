name: Build PursWM Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build All Modules

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build with Gradle
        run: gradle build

      - name: Upload build artifacts - common-lib
        uses: actions/upload-artifact@v4
        with:
          name: McCommon
          path: 04_plugin-suite/common-lib/build/libs/*.jar
          if-no-files-found: warn

      - name: Upload build artifacts - matchmaking
        uses: actions/upload-artifact@v4
        with:
          name: McMatchmaking
          path: 04_plugin-suite/matchmaking/build/libs/*.jar
          if-no-files-found: warn

      - name: Upload build artifacts - friend
        uses: actions/upload-artifact@v4
        with:
          name: McFriend
          path: 04_plugin-suite/friend/build/libs/*.jar
          if-no-files-found: warn

      - name: Upload build artifacts - PartyGameCore
        uses: actions/upload-artifact@v4
        with:
          name: PartyGameCore
          path: 04_plugin-suite/partygame-core/build/libs/*.jar
          if-no-files-found: warn

      - name: Upload build artifacts - SWMFramework
        uses: actions/upload-artifact@v4
        with:
          name: SWMFramework
          path: 01_purpur-swm-framework/build/libs/*.jar
          if-no-files-found: warn

      - name: Upload build artifacts - SWMPartyGame
        uses: actions/upload-artifact@v4
        with:
          name: SWMPartyGame
          path: 02_purpur-swm-partygame/build/libs/*.jar
          if-no-files-found: warn

      - name: Upload build artifacts - WorldConverter
        uses: actions/upload-artifact@v4
        with:
          name: WorldConverter
          path: 03_world-converter/build/libs/*.jar
          if-no-files-found: warn
