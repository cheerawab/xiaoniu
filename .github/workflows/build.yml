name: Build PurWM

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build all projects
        run: ./gradlew clean build --no-daemon

      - name: Save JARs
        uses: actions/upload-artifact@v4
        with:
          name: built-jars
          path: "**/build/libs/*.jar"
