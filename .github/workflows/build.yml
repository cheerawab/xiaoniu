name: Build PurWM

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon

      - name: Upload built JARs
        uses: actions/upload-artifact@v4
        with:
          name: built-jars
          path: |
            01_purpur-swm-framework/build/libs/*-1.0.0.jar
            02_purpur-swm-partygame/build/libs/*-1.0.0.jar
            04_plugin-suite/04_01_matchmaking/build/libs/*.jar
