name: SwmPurpurFramework
author: PartyGame Team
main: co.partygame.framework.SwmPurpurPlugin
version: 1.0.0
api-version: 1.21
description: Generic Slime World Manager framework for party game servers
folia-supported: true

commands:
  worlds:
    description: List all loaded SWM worlds
    usage: /worlds
    permission: swm.framework.worlds
  worldlist:
    description: List all SWM worlds with details
    usage: /worldlist [page]
    permission: swm.framework.worldlist
  worldload:
    description: Load a SWM world from file
    usage: /worldload <name>
    permission: swm.framework.worldload
  worldunload:
    description: Unload a SWM world
    usage: /worldunload <name>
    permission: swm.framework.worldunload
  worldtemplate:
    description: Manage world templates
    usage: /worldtemplate <list|create|import|delete> [name]
    permission: swm.framework.worldtemplate

permissions:
  swm.framework.worlds:
    default: op
    description: List all loaded SWM worlds
  swm.framework.worldlist:
    default: op
    description: List worlds with detailed information
  swm.framework.worldload:
    default: op
    description: Load a world from a .slimeworld file
  swm.framework.worldunload:
    default: op
    description: Unload a world from memory
  swm.framework.worldtemplate:
    default: op
    description: Manage world templates
  swm.framework.teleport:
    default: true
    description: Allow teleporting players between worlds
