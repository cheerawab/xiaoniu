name: PartyGameFramework
author: PartyGame Team
main: co.partygame.partygame.PartyGamePlugin
version: 1.0.0
api-version: 1.21
description: Party Game Framework — session management, matchmaking, round handling
depend: [SwmPurpurFramework]
folia-supported: true

commands:
  game:
    description: Access game system
    usage: /game <status|join|leave|spec>
    permission: game.framework.admin
  gamestatus:
    description: Show game session status
    usage: /gamestatus
    permission: game.framework.status
  join:
    description: Join a game session
    usage: /join [session]
    permission: game.framework.join
  leave:
    description: Leave a game session actively running
    usage: /leave
    permission: game.framework.leave

permissions:
  game.framework.admin:
    default: op
    description: Access game system commands
  game.framework.status:
    default: true
    description: View game session status
  game.framework.join:
    default: true
    description: Join game sessions
  game.framework.leave:
    default: true
    description: Leave active game sessions
