# ============================================
# PartyGame Framework Configuration
# ============================================

# General settings
game:
  # Maximum concurrent game sessions (0 = unlimited)
  max-concurrent-sessions: 10

  # Default round configuration
  round:
    # Default round duration in seconds (0 = no time limit)
    duration: 600
    # Count down warning intervals (in seconds before end)
    countdown-warns:
      - 60
      - 30
      - 10
      - 5
      - 3
      - 1

  # Scoring configuration
  scoring:
    # Points awarded for winning a round
    win-points: 100
    # Points for placing in a round (map: position -> points)
    placement-points:
      1: 100
      2: 75
      3: 50
      4: 25
    # Decay factor for old scores (0 = keep forever)
    score-decay-per-hour: 0

# BungeeCord configuration for cross-server matchmaking
bungeecord:
  enabled: true
  # Channel used for matchmaking communication with Lobby
  channel: "partygame:matchmaking"
  # Timeout for match responses (in milliseconds)
  match-response-timeout: 5000

# World allocation per game type
worlds:
  # Max concurrent game worlds spawned from templates
  max-concurrent-game-worlds: 20
  # Minimum number of players to start a game
  min-players-per-game: 1
  # Maximum players per game session
  max-players-per-game: 32

# Logging
logging:
  enabled: true
  log-session-events: true
  log-round-events: true
  log-matchmaking: true
